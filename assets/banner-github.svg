    <text x="44" y="78" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#8FBF5A">Ownership.</text>
    <text x="44" y="130" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#F49B33">Responsibility.</text>
    <text x="44" y="182" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#E2552E">Ambition.</text>
    <text x="46" y="212" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#C8A88E">Three values, one name. They shape every line of code ora ships in the open.</text>
